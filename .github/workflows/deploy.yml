name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: jonathan
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: sudo /opt/aristeus/app/deploy/deploy.sh
